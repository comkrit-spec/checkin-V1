<!DOCTYPE html>
<html lang="th">
<head>
  </head>
<body>
  <script>
    // 🔗 แก้ไขตรงนี้: ใส่ URL ของ Google Web App ที่คุณก๊อปปี้มา
    const API_URL = "https://script.google.com/macros/s/AKfycbwTonyEThJCZkJHuV_AZvlzBg5_tSzXkN4NkayCbU3i4woM6DxsDHK7CUSJ7sjt9dp7-w/exec"; 

    // 🚀 ฟังก์ชันตัวกลางสำหรับคุยกับ Google API (แทนที่ google.script.run)
    async function callAPI(action, data = {}) {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: action, ...data })
      });
      return await response.json();
    }

    // แก้ไขฟังก์ชันเดิมให้เรียกผ่าน API
    function loadEmployees() { 
      callAPI("getEmployees").then(data => { employeeData = data; renderEmpTable(); }); 
    }

    function loadSettingsData() {
      callAPI("getSettings").then(s => {
        if (!s) s = { logoUrl: "", workStartTime: "08:30", lineToken: "", lineTarget: "", locations: [] };
        if(s.logoUrl) { $("#companyLogo").attr("src", s.logoUrl).show(); $("#setLogo").val(s.logoUrl); }
        $("#setWorkTime").val(s.workStartTime); 
        allowedLocations = s.locations || []; 
        renderLocTable(); 
      });
    }

    function submitData(status) {
      // ... ลอจิกเตรียมข้อมูลเหมือนเดิม ...
      let data = { empId: eId, empName: eName, status: status, ... };
      
      callAPI("saveRecord", { data: data }).then(res => {
        if(res.success) Swal.fire('สำเร็จ', '', 'success').then(() => resetForm());
        else Swal.fire('พลาด', res.message, 'error');
      });
    }

    // ** ฟังก์ชันอื่น ๆ (toggleAdmin, loadReport, ฯลฯ) ให้เปลี่ยน google.script.run เป็น callAPI ทั้งหมดครับ **
  </script>
</body>
</html>
