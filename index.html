<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Check-In Enterprise V12</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.bootstrap5.min.css" rel="stylesheet">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background: linear-gradient(-45deg, #4b6cb7, #182848, #2a5298, #001510); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; color: #333; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 2rem; margin: 1rem auto; width: 100%; max-width: 500px; }
    .admin-card { max-width: 96% !important; margin-top: 30px; margin-bottom: 30px; }
    .clock-display { font-size: 2.5rem; font-weight: 600; text-align: center; color: #182848; margin-bottom: 0; }
    .date-display { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .btn-custom { border-radius: 50px; font-weight: 600; padding: 14px; color: white; border: none; font-size: 1.1rem; width: 100%; transition: 0.3s; }
    .btn-custom:active { transform: scale(0.95); }
    .btn-checkin { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .btn-checkout { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
    .hidden { display: none !important; }
    #companyLogo { max-height: 80px; max-width: 100%; object-fit: contain; margin-bottom: 10px; display: none; }
    .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; z-index: 99; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #fff; border-radius: 0 0 10px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .autocomplete-items div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    .autocomplete-items div:hover { background-color: #e9e9e9; }
    .stat-box { padding: 15px; border-radius: 15px; text-align: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 10px; }
    .stat-box h3 { font-size: 2.2rem; margin: 0; font-weight: 600; }
    .bg-t-blue { background: linear-gradient(45deg, #4b6cb7, #182848); }
    .bg-t-green { background: linear-gradient(45deg, #11998e, #38ef7d); }
    .bg-t-red { background: linear-gradient(45deg, #cb2d3e, #ef473a); }
    .bg-t-orange { background: linear-gradient(45deg, #f12711, #f5af19); }
    .table-img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; transition: transform 0.2s ease; background: #f8f9fa; }
    .table-img:hover { transform: scale(3.5); position: relative; z-index: 999; }
  </style>
</head>
<body>

<div style="position: absolute; top: 15px; right: 15px; z-index: 100;">
  <button type="button" class="btn btn-sm btn-light rounded-pill shadow-sm" onclick="toggleAdmin()"><i class="fas fa-cog text-primary"></i> ผู้ดูแล</button>
</div>

<div class="container d-flex justify-content-center align-items-center" id="userContainer" style="min-height: 100vh;">
  <div id="userSection" class="glass-card">
    <div class="text-center"><img id="companyLogo" src=""></div>
    <div class="clock-display" id="clock">00:00:00</div>
    <div class="date-display" id="date">กำลังโหลด...</div>

    <div id="initScreen" class="text-center mb-3">
      <button type="button" class="btn btn-warning btn-lg rounded-pill px-4 shadow-sm" onclick="initSystem()">
        <i class="fas fa-power-off"></i> แตะเพื่อเปิดกล้อง & GPS
      </button>
    </div>

    <div id="cameraContainer" class="position-relative mx-auto shadow-sm hidden" style="max-width: 300px; border-radius: 15px; overflow: hidden; border: 2px solid #ddd; background: #000; margin-bottom: 15px;">
      <video id="cameraStream" autoplay playsinline style="width: 100%; height: 220px; display: block; object-fit: cover;"></video>
      <button type="button" class="btn btn-primary position-absolute bottom-0 start-50 translate-middle-x mb-2 rounded-pill px-4 shadow" onclick="takePhoto()">
        <i class="fas fa-camera"></i> ถ่ายรูป
      </button>
    </div>

    <div id="previewContainer" class="hidden text-center mb-3">
      <img id="preview" style="max-width: 300px; border-radius: 15px; border: 2px solid #11998e;">
      <br><button type="button" class="btn btn-outline-danger btn-sm mt-2 rounded-pill px-4" onclick="retakePhoto()">ถ่ายใหม่</button>
    </div>

    <div class="mb-3 position-relative">
      <input type="text" id="empSearch" class="form-control form-control-lg" placeholder="🔍 ค้นหารหัส หรือ ชื่อพนักงาน..." autocomplete="off">
      <div id="autocomplete-list" class="autocomplete-items hidden"></div>
    </div>
    <div class="mb-3"><input type="text" id="empName" class="form-control bg-light" readonly></div>

    <div class="mb-4 text-center p-2 rounded bg-light border">
      <div id="locationText" class="text-muted small">รอเปิด GPS...</div>
      <div id="distanceStatus" class="mt-1 small"><span class="badge bg-secondary">กรุณากดปุ่มเปิดระบบ</span></div>
    </div>

    <div class="row g-2">
      <div class="col-6"><button type="button" class="btn-custom btn-checkin" id="btnCheckIn" onclick="submitData('Check-In')" disabled>เข้างาน</button></div>
      <div class="col-6"><button type="button" class="btn-custom btn-checkout" id="btnCheckOut" onclick="submitData('Check-Out')" disabled>ออกงาน</button></div>
    </div>
  </div>
</div>

<div class="container-fluid d-flex justify-content-center align-items-start hidden" id="adminContainer" style="min-height: 100vh; padding-top: 20px;">
  <div id="adminSection" class="glass-card admin-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0"><i class="fas fa-cogs text-primary"></i> Admin Dashboard</h3>
      <div>
        <button type="button" class="btn btn-primary btn-sm rounded-pill me-2" onclick="loadAdminData()"><i class="fas fa-sync-alt"></i> โหลดข้อมูลใหม่</button>
        <button type="button" class="btn btn-outline-danger btn-sm rounded-pill" onclick="closeAdmin()">ปิด</button>
      </div>
    </div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabReport">รายงาน</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabEmp">พนักงาน</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabSettings">ตั้งค่า</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tabReport">
        
        <div class="row g-2 mb-4">
          <div class="col-6 col-md-3"><div class="stat-box bg-t-blue"><h3 id="statTotal">-</h3><p>ทั้งหมด</p></div></div>
          <div class="col-6 col-md-3"><div class="stat-box bg-t-green"><h3 id="statCheckIn">-</h3><p>เข้าแล้ววันนี้</p></div></div>
          <div class="col-6 col-md-3"><div class="stat-box bg-t-red"><h3 id="statLate">-</h3><p>สาย</p></div></div>
          <div class="col-6 col-md-3"><div class="stat-box bg-t-orange"><h3 id="statMissing">-</h3><p>ยังไม่เข้า</p></div></div>
        </div>

        <div class="bg-light p-3 rounded border mb-3">
          <div class="row align-items-end g-2">
            <div class="col-md-3"><label class="form-label small mb-0">ตั้งแต่วันที่:</label><input type="date" id="minDate" class="form-control form-control-sm"></div>
            <div class="col-md-3"><label class="form-label small mb-0">ถึงวันที่:</label><input type="date" id="maxDate" class="form-control form-control-sm"></div>
            <div class="col-md-2"><button class="btn btn-sm btn-primary w-100" onclick="filterDate()"><i class="fas fa-filter"></i> กรอง</button></div>
            <div class="col-md-2"><button class="btn btn-sm btn-secondary w-100" onclick="clearFilter()"><i class="fas fa-sync"></i> ล้าง</button></div>
          </div>
        </div>

        <div class="table-responsive">
          <table id="reportTable" class="table table-striped table-bordered align-middle w-100" style="font-size:0.85rem;">
            <thead><tr><th>เวลา</th><th>รหัส</th><th>ชื่อ-สกุล</th><th>สถานะ</th><th>สถานที่</th><th>เข้าสาย</th><th>ชม.ทำงาน</th><th>แผนที่</th><th>รูป</th><th>จัดการ</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      
      <div class="tab-pane fade" id="tabEmp">
        <div class="bg-light p-3 rounded border mb-3">
          <div class="row g-2">
            <div class="col-md-5"><input type="text" id="newEmpId" class="form-control" placeholder="รหัสพนักงาน"></div>
            <div class="col-md-5"><input type="text" id="newEmpName" class="form-control" placeholder="ชื่อ-สกุล"></div>
            <div class="col-md-2"><button onclick="addEmp()" class="btn btn-primary w-100">เพิ่ม</button></div>
          </div>
        </div>
        <table id="empTable" class="table table-bordered w-100">
          <thead class="table-secondary"><tr><th>รหัส</th><th>ชื่อ</th><th>ลบ</th></tr></thead>
          <tbody id="empTableBody"></tbody>
        </table>
      </div>

      <div class="tab-pane fade" id="tabSettings">
         <div class="row g-3">
           <div class="col-md-6">
             <div class="bg-light p-3 border rounded h-100">
               <label class="fw-bold">Logo URL</label>
               <input type="text" id="setLogo" class="form-control mb-3">
               <label class="fw-bold">เวลาเริ่มงาน (เช่น 08:30)</label>
               <input type="text" id="setWorkTime" class="form-control mb-3">
               <label class="fw-bold text-danger">เปลี่ยนรหัสผ่าน Admin</label>
               <input type="text" id="setAdminPwd" class="form-control" placeholder="เว้นว่างถ้าไม่ต้องการเปลี่ยน">
             </div>
           </div>
           <div class="col-md-6">
             <div class="bg-light p-3 border rounded h-100 border-success">
               <label class="fw-bold text-success">LINE Access Token</label>
               <textarea id="setLineToken" class="form-control mb-3" rows="3"></textarea>
               <label class="fw-bold text-success">LINE Target ID</label>
               <input type="text" id="setLineTarget" class="form-control mb-2">
             </div>
           </div>
           <div class="col-12"><button onclick="saveSettings()" class="btn btn-success w-100 py-2">บันทึกตั้งค่าทั้งหมด</button></div>
         </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.bootstrap5.min.js"></script>

<script>
  // 🔗 1. แก้ไข URL API ของคุณตรงนี้
  const API_URL = "https://script.google.com/macros/s/AKfycbyl4pjwAszaeJ7GodtY9anJkip6uGrXxj8GWVxYYf_5PF_FB1DnFRWbqDWBGOxSVJNeEQ/exec";

  let employeeData = [], allowedLocations = [], currentLat = "", currentLng = "", base64Image = "";
  let reportTable = null;

  async function callAPI(action, payload = {}) {
    try {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: action, data: payload }) });
      const json = await res.json();
      return json.data;
    } catch (e) { console.error("API Error", e); return null; }
  }

  function getDriveImageSrc(url) {
    if (!url) return '';
    let fileIdMatch = url.match(/[-\w]{25,}/);
    if (fileIdMatch) return "https://lh3.googleusercontent.com/d/" + fileIdMatch[0];
    return url;
  }

  function initSystem() { $('#initScreen').addClass('hidden'); $('#cameraContainer').removeClass('hidden'); startCamera(); getLocation(); }

  function startCamera() {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => { document.getElementById('cameraStream').srcObject = s; });
    }
  }

  function takePhoto() {
    const v = document.getElementById('cameraStream');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth || 640; c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    const dataUrl = c.toDataURL('image/jpeg', 0.8);
    base64Image = dataUrl.split(',')[1];
    document.getElementById('preview').src = dataUrl;
    $('#cameraContainer').addClass('hidden'); $('#previewContainer').removeClass('hidden');
  }

  function retakePhoto() { base64Image = ""; $('#previewContainer').addClass('hidden'); $('#cameraContainer').removeClass('hidden'); }

  $(document).ready(async function() {
    setInterval(() => { const n = new Date(); $('#clock').text(n.toLocaleTimeString('th-TH')); $('#date').text(n.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })); }, 1000);
    
    const s = await callAPI("getSettings");
    if(s && s.logoUrl) $("#companyLogo").attr("src", s.logoUrl).show();
    allowedLocations = (s && s.locations) ? s.locations : [];
    
    employeeData = await callAPI("getEmployees") || [];

    $('#empSearch').on('input', function() {
      let val = $(this).val().toLowerCase(); let listDiv = $('#autocomplete-list'); listDiv.empty().removeClass('hidden');
      if(!val) return;
      employeeData.filter(e => String(e[0]).includes(val) || String(e[1]).includes(val)).slice(0, 10).forEach(emp => {
        let item = $(`<div><strong>${emp[0]}</strong> - ${emp[1]}</div>`).on('click', () => { $('#empSearch').val(`${emp[0]} - ${emp[1]}`); $('#empName').val(emp[1]); listDiv.addClass('hidden'); });
        listDiv.append(item);
      });
    });
    $(document).click(e => { if(!$(e.target).closest('#empSearch, #autocomplete-list').length) $('#autocomplete-list').addClass('hidden'); });

    // ฟังก์ชันช่วยคัดกรองวันที่ของ DataTables
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
      if (settings.nTable.id !== 'reportTable') return true;
      let min = $('#minDate').val(); let max = $('#maxDate').val();
      if (!min && !max) return true;
      
      let dateParts = String(data[0]).split(',')[0].split(' ')[0].split('/'); 
      if(dateParts.length < 3) return true; 
      let rowDate = new Date(dateParts[2], dateParts[1] - 1, dateParts[0]); 
      
      let minD = min ? new Date(min) : null; if(minD) minD.setHours(0,0,0,0);
      let maxD = max ? new Date(max) : null; if(maxD) maxD.setHours(23,59,59,999);
      
      if ((!minD && rowDate <= maxD) || (minD <= rowDate && !maxD) || (minD <= rowDate && rowDate <= maxD)) return true;
      return false;
    });
  });

  function getLocation() {
    navigator.geolocation.watchPosition(p => {
      currentLat = p.coords.latitude; currentLng = p.coords.longitude;
      $("#locationText").html(`📍 พิกัด: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`);
      checkGeo(currentLat, currentLng);
    }, e => {
      $("#locationText").html(`<span class="text-danger">❌ ค้นหาพิกัดไม่พบ หรือถูกบล็อก</span>`);
    }, { enableHighAccuracy: true });
  }

  function checkGeo(lat, lng) {
    if(allowedLocations.length === 0) return;
    let ok = false, locName = "นอกพื้นที่";
    for (let l of allowedLocations) {
      let d = Math.round(6371e3 * 2 * Math.atan2(Math.sqrt(Math.sin((l.lat-lat)*Math.PI/360)**2 + Math.cos(lat*Math.PI/180)*Math.cos(l.lat*Math.PI/180)*Math.sin((l.lng-lng)*Math.PI/360)**2), Math.sqrt(1-(Math.sin((l.lat-lat)*Math.PI/360)**2 + Math.cos(lat*Math.PI/180)*Math.cos(l.lat*Math.PI/180)*Math.sin((l.lng-lng)*Math.PI/360)**2))));
      if (d <= l.radius) { ok = true; locName = l.name; $("#distanceStatus").html(`<span class="badge bg-success">✅ ${l.name}</span>`); break; }
    }
    if(!ok) $("#distanceStatus").html(`<span class="badge bg-danger">❌ นอกพื้นที่</span>`);
    $("#btnCheckIn, #btnCheckOut").prop('disabled', !ok);
  }

  async function submitData(status) {
    if(!$('#empName').val() || !base64Image) return Swal.fire('เตือน', 'กรอกข้อมูลและถ่ายรูปให้ครบ', 'warning');
    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
    await callAPI("saveRecord", { empId: $('#empSearch').val().split(' - ')[0], empName: $('#empName').val(), status: status, imageBase64: base64Image, lat: currentLat, lng: currentLng, locationName: $("#distanceStatus").text().replace(/✅ |❌ /,'').split(' ')[0] });
    Swal.fire('สำเร็จ', '', 'success').then(() => { $('#empSearch').val(''); $('#empName').val(''); retakePhoto(); });
  }

  async function toggleAdmin() {
    const { value: pwd } = await Swal.fire({ title: 'รหัส Admin', input: 'password' });
    if(pwd) {
      Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() });
      if (await callAPI("verifyAdminPassword", { pwd: pwd })) {
        $('#userContainer').addClass('hidden'); $('#adminContainer').removeClass('hidden');
        loadAdminData();
      } else { Swal.fire('พลาด', 'รหัสผิด', 'error'); }
    }
  }

  function closeAdmin() { $('#adminContainer').addClass('hidden'); $('#userContainer').removeClass('hidden'); }

  // 🚀 โหลดข้อมูล Admin และระบบนับสถิติ (แก้ไขให้ฉลาดขึ้น)
  async function loadAdminData() {
    Swal.fire({ title: 'กำลังดึงข้อมูลฐานระบบ...', didOpen: () => Swal.showLoading() });

    const logs = await callAPI("getLogs") || [];
    let tbody = "";
    
    let today = new Date();
    let tDay = today.getDate(), tMonth = today.getMonth() + 1, tYear = today.getFullYear();
    let checkedInSet = new Set(), lateCount = 0;

    logs.forEach(r => {
      // ดึงเฉพาะส่วนวันที่ออกมา (เพื่อแก้ปัญหา 21/3 กับ 21/03)
      let rDateStr = String(r[0]).split(',')[0].trim().split(' ')[0]; 
      let dParts = rDateStr.split('/');
      
      if (dParts.length >= 3) {
        let rDay = parseInt(dParts[0]), rMonth = parseInt(dParts[1]), rYear = parseInt(dParts[2]);
        
        // เช็คว่าเป็นของ "วันนี้" ใช่หรือไม่
        if (rDay === tDay && rMonth === tMonth && rYear === tYear) {
          if (r[3] === 'Check-In') {
            checkedInSet.add(r[1]); // นับคนเข้างาน (ไม่ซ้ำ)
            
            // เช็คว่ามาสายไหม
            let lateStatus = String(r[8] || '').trim();
            if (lateStatus !== 'ปกติ' && lateStatus !== '-' && lateStatus !== '') {
              lateCount++;
            }
          }
        }
      }

      // วาดแถวตาราง
      let lateBadge = r[8] === "ปกติ" ? '<span class="badge bg-success">ปกติ</span>' : (r[8] && r[8] !== "-" ? '<span class="badge bg-danger">' + r[8] + '</span>' : "-");
      let mapLink = `<a href="https://www.google.com/maps?q=0${r[5]},${r[6]}" target="_blank" class="btn btn-sm btn-info text-white py-0"><i class="fas fa-map-marker-alt"></i></a>`;
      let imgLink = r[7] ? `<a href="${r[7]}" target="_blank"><img src="${getDriveImageSrc(r[7])}" class="table-img" alt="รูป"></a>` : '-';
      
      tbody += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td><span class="badge ${r[3]==='Check-In'?'bg-success':'bg-danger'}">${r[3]}</span></td><td><b>${r[4]}</b></td><td>${lateBadge}</td><td><b class="text-primary">${r[9]||'-'}</b></td><td>${mapLink}</td><td>${imgLink}</td><td><button onclick="delLog('${r[10] || r[0]}','${r[1]}')" class="btn btn-danger btn-sm py-0">ลบ</button></td></tr>`;
    });

    if(reportTable) reportTable.destroy();
    $('#reportTable tbody').html(tbody);
    
    // ตั้งค่า DataTables พร้อมปุ่ม Export Excel
    reportTable = $('#reportTable').DataTable({ 
      order: [[0, "desc"]],
      dom: "<'row mb-3'<'col-md-4'l><'col-md-4 text-center'B><'col-md-4'f>>t<'row mt-3'<'col-md-5'i><'col-md-7'p>>",
      buttons: [ { extend: 'excelHtml5', text: '<i class="fas fa-file-excel"></i> ส่งออก Excel', className: 'btn btn-success btn-sm' } ],
      lengthMenu: [[10, 30, 50, 100, -1], [10, 30, 50, 100, "ทั้งหมด"]]
    });

    // โหลดข้อมูลตาราง Employee
    employeeData = await callAPI("getEmployees") || [];
    let empHtml = "";
    employeeData.forEach(e => { empHtml += `<tr><td>${e[0]}</td><td>${e[1]}</td><td><button class="btn btn-sm btn-danger py-0" onclick="delEmp('${e[0]}','${e[1]}')"><i class="fas fa-trash"></i></button></td></tr>`; });
    $("#empTableBody").html(empHtml);

    // ดึงข้อมูลการตั้งค่า
    const s = await callAPI("getSettings");
    if(s) {
      $("#setLogo").val(s.logoUrl || ""); $("#setWorkTime").val(s.workStartTime || "08:30");
      $("#setLineToken").val(s.lineToken || ""); $("#setLineTarget").val(s.lineTarget || "");
    }

    // อัปเดตตัวเลขสถิติ
    let totalE = employeeData.length;
    $('#statTotal').text(totalE);
    $('#statCheckIn').text(checkedInSet.size);
    $('#statLate').text(lateCount);
    $('#statMissing').text(Math.max(0, totalE - checkedInSet.size));

    Swal.close();
  }

  function filterDate() { if(reportTable) reportTable.draw(); }
  function clearFilter() { $('#minDate').val(''); $('#maxDate').val(''); if(reportTable) reportTable.draw(); }

  async function addEmp() {
    let id = $('#newEmpId').val(), name = $('#newEmpName').val();
    if(!id || !name) return;
    Swal.fire({title:'กำลังเพิ่ม...', didOpen:()=>Swal.showLoading()});
    await callAPI("addEmployee", { empId: id, empName: name });
    $('#newEmpId').val(''); $('#newEmpName').val(''); loadAdminData();
  }

  async function delEmp(id, name) {
    if(confirm(`ลบพนักงาน ${name}?`)) {
      Swal.fire({title:'กำลังลบ...', didOpen:()=>Swal.showLoading()});
      await callAPI("deleteEmployee", { empId: id }); loadAdminData();
    }
  }

  async function delLog(ts, id) {
    if(confirm('ลบประวัตินี้?')) {
      Swal.fire({title:'กำลังลบ...', didOpen:()=>Swal.showLoading()});
      await callAPI("deleteLogRecord", { ts: ts, eid: id }); loadAdminData();
    }
  }

  async function saveSettings() {
    Swal.fire({title:'กำลังบันทึก...', didOpen:()=>Swal.showLoading()});
    await callAPI("saveAdvanceSettings", { logo: $('#setLogo').val(), pwd: $('#setAdminPwd').val(), time: $('#setWorkTime').val(), token: $('#setLineToken').val(), target: $('#setLineTarget').val() });
    $('#setAdminPwd').val(''); Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าแล้ว', 'success');
  }
</script>
</body>
</html>
