<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Smart Check-In Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background: linear-gradient(-45deg, #4b6cb7, #182848, #2a5298, #001510); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; color: #333; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); padding: 2rem; margin: 1rem auto; width: 100%; max-width: 500px; }
    .admin-card { max-width: 96% !important; margin-top: 30px; margin-bottom: 30px; }
    .clock-display { font-size: 2.5rem; font-weight: 600; text-align: center; color: #182848; margin-bottom: 0; }
    .date-display { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .btn-custom { border-radius: 50px; font-weight: 600; padding: 14px; color: white; border: none; font-size: 1.1rem; width: 100%; }
    .btn-checkin { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .btn-checkout { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
    .hidden { display: none !important; }
    #companyLogo { max-height: 80px; max-width: 100%; object-fit: contain; margin-bottom: 10px; display: none; }
    .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; z-index: 99; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #fff; border-radius: 0 0 10px 10px; }
    .autocomplete-items div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    .autocomplete-items div:hover { background-color: #e9e9e9; }
    .stat-box { padding: 15px; border-radius: 15px; text-align: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 10px; }
    .stat-box h3 { font-size: 2.2rem; margin: 0; font-weight: 600; }
    .bg-t-blue { background: linear-gradient(45deg, #4b6cb7, #182848); }
    .bg-t-green { background: linear-gradient(45deg, #11998e, #38ef7d); }
    .bg-t-red { background: linear-gradient(45deg, #cb2d3e, #ef473a); }
    .bg-t-orange { background: linear-gradient(45deg, #f12711, #f5af19); }
  </style>
</head>
<body>

<div style="position: absolute; top: 15px; right: 15px; z-index: 100;">
  <button type="button" class="btn btn-sm btn-light rounded-pill shadow-sm" onclick="toggleAdmin()"><i class="fas fa-cog"></i></button>
</div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div id="userSection" class="glass-card">
    <div class="text-center"><img id="companyLogo" src=""></div>
    <div class="clock-display" id="clock">00:00:00</div>
    <div class="date-display" id="date">กำลังโหลด...</div>

    <div class="mb-3 position-relative">
      <input type="text" id="empSearch" class="form-control form-control-lg" placeholder="🔍 ค้นหารหัส หรือ ชื่อพนักงาน..." autocomplete="off">
      <div id="autocomplete-list" class="autocomplete-items hidden"></div>
    </div>
    <div class="mb-3"><input type="text" id="empName" class="form-control bg-light" placeholder="ชื่อ-สกุล (อัตโนมัติ)" readonly></div>

    <div class="mb-3 text-center">
      <label class="form-label text-primary fw-bold"><i class="fas fa-camera"></i> ถ่ายรูปยืนยันตัวตน</label>
      <div id="cameraContainer" class="position-relative mx-auto shadow-sm" style="max-width: 300px; border-radius: 15px; overflow: hidden; border: 2px solid #ddd; background: #000;">
        <video id="cameraStream" autoplay playsinline style="width: 100%; height: 220px; display: block; object-fit: cover;"></video>
        <button type="button" class="btn btn-primary position-absolute bottom-0 start-50 translate-middle-x mb-2 rounded-pill px-4 shadow" onclick="takePhoto()">
          <i class="fas fa-camera"></i> ถ่ายรูป
        </button>
      </div>
      <div id="previewContainer" class="hidden mx-auto" style="max-width: 300px;">
        <img id="preview" style="width: 100%; border-radius: 15px; border: 2px solid #11998e; object-fit: cover;">
        <button type="button" class="btn btn-outline-danger btn-sm mt-2 rounded-pill px-4" onclick="retakePhoto()"><i class="fas fa-redo"></i> ถ่ายใหม่</button>
      </div>
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <div class="mb-4 text-center p-2 rounded bg-light border">
      <h6 class="mb-1 text-danger"><i class="fas fa-map-marker-alt"></i> สถานที่เช็คอิน</h6>
      <div id="locationText" class="text-muted small">กำลังเตรียม GPS...</div>
      <div id="distanceStatus" class="mt-1 small"><span class="badge bg-secondary">กำลังโหลดข้อมูล...</span></div>
    </div>

    <div class="row g-2">
      <div class="col-6"><button type="button" class="btn-custom btn-checkin" id="btnCheckIn" onclick="submitData('Check-In')" disabled>เข้างาน</button></div>
      <div class="col-6"><button type="button" class="btn-custom btn-checkout" id="btnCheckOut" onclick="submitData('Check-Out')" disabled>ออกงาน</button></div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // 🔗 1. เอา Web App URL ของ Google มาวางที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycbyl4pjwAszaeJ7GodtY9anJkip6uGrXxj8GWVxYYf_5PF_FB1DnFRWbqDWBGOxSVJNeEQ/exec";

  let employeeData = [], allowedLocations = [];
  let currentLat = "", currentLng = "", base64Image = "", currentLocName = "นอกพื้นที่", isInRange = false;
  let isSettingsLoaded = false, cameraStreamObj = null;

  // 🚀 ฟังก์ชันหลักสำหรับเรียก API จาก Google
  async function callAPI(action, payload = {}) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: action, data: payload })
      });
      const json = await response.json();
      if(!json.success) throw new Error(json.message);
      return json.data;
    } catch (err) {
      console.error("API Error:", err);
      throw err;
    }
  }

  // 📸 ระบบกล้องสด
  function startCamera() {
    const video = document.getElementById('cameraStream');
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => { cameraStreamObj = stream; video.srcObject = stream; })
        .catch(err => Swal.fire('เตือน', 'กรุณาอนุญาตให้เว็บไซต์ใช้งานกล้อง', 'warning'));
    }
  }

  function takePhoto() {
    const video = document.getElementById('cameraStream');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    base64Image = dataUrl.split(',')[1];
    document.getElementById('preview').src = dataUrl;
    $('#cameraContainer').addClass('hidden');
    $('#previewContainer').removeClass('hidden');
  }

  function retakePhoto() {
    base64Image = "";
    $('#previewContainer').addClass('hidden');
    $('#cameraContainer').removeClass('hidden');
  }

  // เริ่มการทำงาน
  $(document).ready(async function() {
    startClock();
    startCamera();
    getLocation();

    try {
      // ดึงการตั้งค่า
      const s = await callAPI("getSettings");
      if(s.logoUrl) { $("#companyLogo").attr("src", s.logoUrl).show(); }
      allowedLocations = s.locations || [];
      isSettingsLoaded = true;
      if (currentLat !== "") checkGeoFencing(currentLat, currentLng);

      // ดึงรายชื่อพนักงาน
      employeeData = await callAPI("getEmployees");
    } catch(e) {
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
    }

    // ระบบค้นหาพนักงาน
    $('#empSearch').on('input', function() {
      let val = $(this).val().toLowerCase(); let listDiv = $('#autocomplete-list'); listDiv.empty().removeClass('hidden');
      if(!val) return;
      let matches = employeeData.filter(emp => String(emp[0]).toLowerCase().includes(val) || String(emp[1]).toLowerCase().includes(val)).slice(0, 10);
      matches.forEach(emp => {
        let item = $(`<div><strong>${emp[0]}</strong> - ${emp[1]}</div>`);
        item.on('click', () => { $('#empSearch').val(`${emp[0]} - ${emp[1]}`); $('#empName').val(emp[1]); listDiv.addClass('hidden'); });
        listDiv.append(item);
      });
    });
    $(document).click(e => { if(!$(e.target).closest('#empSearch, #autocomplete-list').length) $('#autocomplete-list').addClass('hidden'); });
  });

  function startClock() {
    setInterval(() => {
      const now = new Date(); $('#clock').text(now.toLocaleTimeString('th-TH'));
      $('#date').text(now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }));
    }, 1000);
  }

  // 📍 ระบบ GPS
  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        p => { 
          currentLat = p.coords.latitude; currentLng = p.coords.longitude; 
          $("#locationText").html(`📍 พิกัด: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`); 
          if(isSettingsLoaded) checkGeoFencing(currentLat, currentLng); 
        }, 
        e => { 
          $("#locationText").html(`<span class="text-danger">❌ คุณไม่อนุญาตให้ใช้ GPS</span>`);
          $("#distanceStatus").html(`<span class="badge bg-danger">ไม่สามารถใช้งานได้</span>`);
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
  }

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; const a = Math.sin((lat2-lat1)*Math.PI/360)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin((lon2-lon1)*Math.PI/360)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }

  function checkGeoFencing(lat, lng) {
    if (allowedLocations.length === 0) return;
    isInRange = false; currentLocName = "นอกสถานที่"; let closestDist = Infinity;
    for (let loc of allowedLocations) {
      let d = calculateDistance(lat, lng, loc.lat, loc.lng);
      if (d <= loc.radius) { isInRange = true; currentLocName = loc.name; $("#distanceStatus").html(`<span class="badge bg-success">✅ ${loc.name} (ห่าง ${d}ม.)</span>`); $("#btnCheckIn, #btnCheckOut").prop('disabled', false); return; }
      if (d < closestDist) closestDist = d;
    }
    $("#distanceStatus").html(`<span class="badge bg-danger">❌ นอกพื้นที่ (ใกล้สุด ${closestDist}ม.)</span>`); $("#btnCheckIn, #btnCheckOut").prop('disabled', true);
  }

  // 📤 ส่งข้อมูลเข้า Google Sheets
  async function submitData(status) {
    let sVal = $('#empSearch').val(), eName = $('#empName').val();
    if(!sVal || !eName || !base64Image || !isInRange) return Swal.fire('เตือน', 'ข้อมูลไม่ครบ หรือ อยู่นอกพื้นที่', 'warning');

    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
    try {
      let payload = { empId: sVal.split(' - ')[0], empName: eName, status: status, locationName: currentLocName, lat: currentLat, lng: currentLng, imageBase64: base64Image };
      let res = await callAPI("saveRecord", payload);
      Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: res.message, timer: 2000, showConfirmButton: false }).then(() => {
        $('#empSearch').val(''); $('#empName').val(''); retakePhoto();
      });
    } catch(e) {
      Swal.fire('ผิดพลาด', e.message, 'error');
    }
  }

  function toggleAdmin() {
    Swal.fire({ title: 'รหัส Admin', input: 'password', showCancelButton: true }).then(async (res) => {
      if (res.isConfirmed) {
        Swal.fire({title:'ตรวจสอบ...', didOpen:()=>Swal.showLoading()});
        try {
          let valid = await callAPI("verifyAdminPassword", { pwd: res.value });
          if(valid) window.open("https://docs.google.com/spreadsheets/d/ใส่_ID_SHEETS_ของคุณที่นี่", "_blank");
          else Swal.fire('พลาด', 'รหัสผ่านผิด', 'error');
        } catch(e) { Swal.fire('Error', e.message, 'error'); }
      }
    });
  }
</script>
</body>
</html>
